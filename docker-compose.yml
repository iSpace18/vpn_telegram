version: '3.8'

services:
  bot:
    build: .
    container_name: vpn_telegram_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data   # для SQLite базы
    # Если используете PostgreSQL, добавьте зависимость от db
    # depends_on:
    #   - db
    networks:
      - botnet

  # Опционально: PostgreSQL
  # db:
  #   image: postgres:15-alpine
  #   container_name: vpn_bot_db
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: vpnbot
  #     POSTGRES_PASSWORD: vpnbotpass
  #     POSTGRES_DB: vpnbot
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - botnet

networks:
  botnet:
    driver: bridge

